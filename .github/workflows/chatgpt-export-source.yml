name: ChatGPT Export Source

on:
  push:
    branches:
      - chatgpt-source-export
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create source archive
        run: |
          zip -r marketsync-source.zip . \
            -x '.git/*' \
            -x 'node_modules/*' \
            -x 'apps/*/node_modules/*' \
            -x '.env' \
            -x '.env.*'

      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: marketsync-source
          path: marketsync-source.zip
          if-no-files-found: error
          retention-days: 1
